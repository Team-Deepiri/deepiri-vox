<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fox Rocket Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a12;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Press Start 2P', monospace;
            overflow: hidden;
        }
        
        #gameContainer {
            position: relative;
            border: 4px solid #ff6b35;
            box-shadow: 0 0 40px rgba(255,107,53,0.4), inset 0 0 60px rgba(0,0,0,0.5);
        }
        
        #gameCanvas {
            display: block;
            background: #1a0a2e;
        }
        
        #ui {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }
        
        .ui-panel {
            background: rgba(0,0,0,0.7);
            border: 2px solid #ff6b35;
            padding: 10px 15px;
            color: #fff;
            font-size: 10px;
            text-shadow: 0 0 10px #ff6b35;
        }
        
        #score { color: #ffd700; }
        #timer { color: #ff4444; }
        #direction { color: #00ff88; }
        
        #rocketWarning {
            position: absolute;
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,0,0,0.8);
            color: #fff;
            padding: 15px 30px;
            font-size: 14px;
            display: none;
            animation: blink 0.3s infinite;
            z-index: 20;
        }
        
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        #startScreen, #gameOverScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10,10,18,0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 30;
        }
        
        #startScreen h1, #gameOverScreen h1 {
            color: #ff6b35;
            font-size: 28px;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { text-shadow: 0 0 20px #ff6b35, 0 0 40px #ff6b35; }
            50% { text-shadow: 0 0 30px #ff6b35, 0 0 60px #ff6b35; }
        }
        
        .btn {
            background: #ff6b35;
            color: #fff;
            border: none;
            padding: 15px 40px;
            font-family: 'Press Start 2P', monospace;
            font-size: 12px;
            cursor: pointer;
            margin: 10px;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #ff8855;
            transform: scale(1.1);
            box-shadow: 0 0 30px #ff6b35;
        }
        
        #controls {
            color: #888;
            font-size: 8px;
            margin-top: 30px;
            text-align: center;
            line-height: 2;
        }
        
        #gameOverScreen { display: none; }
        #finalScore { color: #ffd700; font-size: 18px; margin: 20px 0; }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div id="ui">
            <div class="ui-panel">SCORE: <span id="score">0</span></div>
            <div class="ui-panel">ROCKET: <span id="timer">25</span>s</div>
            <div class="ui-panel">DIR: <span id="direction">NORTH</span></div>
        </div>
        <div id="rocketWarning">🚀 NEW ROCKET! PRESS ENTER!</div>
        <div id="startScreen">
            <h1>🦊 FOX ROCKET ARCADE</h1>
            <button class="btn" onclick="startGame()">START</button>
            <div id="controls">
                ARROWS/WASD - MOVE<br>
                SPACE - FIRE<br>
                Q/E - TURN 50°<br>
                ENTER - HOP ROCKET
            </div>
        </div>
        <div id="gameOverScreen">
            <h1>GAME OVER</h1>
            <div id="finalScore">0</div>
            <button class="btn" onclick="startGame()">RETRY</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const ROCK_EXPLODE_TIME = 25;
        const ROCKET_WIDTH = 30;
        const ROCKET_HEIGHT = 50;
        const FOX_SIZE = 40;
        
        let gameState = 'MENU';
        let score = 0;
        let gameTime = 0;
        let lastTime = 0;
        
        let fox = { x: 400, y: 450, vx: 0, vy: 0, onRocket: true };
        let rocket = { x: 400, y: 380, timer: ROCK_EXPLODE_TIME, exploding: false };
        let newRocket = null;
        let newRocketTimer = 0;
        
        let direction = 0;
        let directionAngle = 0;
        let targetAngle = 0;
        let screenRotation = 0;
        let targetRotation = 0;
        
        let backgrounds = ['space', 'city', 'desert', 'forest'];
        let currentBg = 0;
        
        let enemies = [];
        let bullets = [];
        let enemyBullets = [];
        let powerups = [];
        let particles = [];
        let stars = [];
        
        let keys = {};
        let canShoot = true;
        let shootCooldown = 0;
        
        let powerupsActive = { rapidFire: 0, shield: 0, multiplier: 0 };
        
        const backgroundsData = {
            space: {
                color1: '#1a0a2e', color2: '#2d1b4e',
                stars: true, nebula: true
            },
            city: {
                color1: '#0a1628', color2: '#1a2848',
                buildings: true, neon: true
            },
            desert: {
                color1: '#2e1a0a', color2: '#4e2b1b',
                dunes: true, rocks: true
            },
            forest: {
                color1: '#0a2e1a', color2: '#1b4e2d',
                trees: true, mist: true
            }
        };
        
        const directionNames = ['NORTH', 'NORTHEAST', 'EAST', 'SOUTHEAST', 'SOUTH', 'SOUTHWEST', 'WEST', 'NORTHWEST'];
        
        function init() {
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2 + 0.5,
                    speed: Math.random() * 3 + 1,
                    brightness: Math.random()
                });
            }
        }
        
        function startGame() {
            gameState = 'PLAYING';
            score = 0;
            gameTime = 0;
            
            fox = { x: 400, y: 450, vx: 0, vy: 0, onRocket: true };
            rocket = { x: 400, y: 380, timer: ROCK_EXPLODE_TIME, exploding: false };
            newRocket = null;
            newRocketTimer = 0;
            
            direction = 0;
            directionAngle = 0;
            targetAngle = 0;
            screenRotation = 0;
            targetRotation = 0;
            currentBg = 0;
            
            enemies = [];
            bullets = [];
            enemyBullets = [];
            powerups = [];
            particles = [];
            
            powerupsActive = { rapidFire: 0, shield: 0, multiplier: 0 };
            shootCooldown = 0;
            
            document.getElementById('startScreen').style.display = 'none';
            document.getElementById('gameOverScreen').style.display = 'none';
            document.getElementById('rocketWarning').style.display = 'none';
            
            lastTime = performance.now();
            requestAnimationFrame(gameLoop);
        }
        
        function gameLoop(timestamp) {
            if (gameState !== 'PLAYING') return;
            
            const dt = Math.min((timestamp - lastTime) / 1000, 0.1);
            lastTime = timestamp;
            gameTime += dt;
            
            update(dt);
            render();
            
            requestAnimationFrame(gameLoop);
        }
        
        function update(dt) {
            if (rocket.exploding) {
                updateExplosion(dt);
                return;
            }
            
            updateInput(dt);
            updateFox(dt);
            updateRocket(dt);
            updateDirection(dt);
            updateEnemies(dt);
            updateBullets(dt);
            updateParticles(dt);
            updatePowerups(dt);
            checkCollisions();
            
            rocket.timer -= dt;
            if (rocket.timer <= 0) {
                explodeRocket();
            }
            
            if (newRocket && newRocketTimer > 0) {
                newRocketTimer -= dt;
                if (newRocketTimer <= 0) {
                    newRocket = null;
                    document.getElementById('rocketWarning').style.display = 'none';
                }
            }
            
            if (shootCooldown > 0) shootCooldown -= dt;
            if (powerupsActive.rapidFire > 0) powerupsActive.rapidFire -= dt;
            if (powerupsActive.shield > 0) powerupsActive.shield -= dt;
            if (powerupsActive.multiplier > 0) powerupsActive.multiplier -= dt;
        }
        
        function updateInput(dt) {
            const speed = 300;
            
            fox.vx = 0;
            fox.vy = 0;
            
            if (keys['ArrowLeft'] || keys['KeyA']) fox.vx = -speed;
            if (keys['ArrowRight'] || keys['KeyD']) fox.vx = speed;
            if (keys['ArrowUp'] || keys['KeyW']) fox.vy = -speed;
            if (keys['ArrowDown'] || keys['KeyS']) fox.vy = speed;
            
            if (keys['Space'] && canShoot) {
                if (powerupsActive.rapidFire > 0) {
                    shoot();
                } else if (shootCooldown <= 0) {
                    shoot();
                    shootCooldown = 0.2;
                }
            }
            
            if (keys['KeyQ']) {
                changeDirection(-1);
                keys['KeyQ'] = false;
            }
            if (keys['KeyE']) {
                changeDirection(1);
                keys['KeyE'] = false;
            }
            if (keys['Enter'] && newRocket) {
                hopToRocket();
                keys['Enter'] = false;
            }
        }
        
        function updateFox(dt) {
            fox.x += fox.vx * dt;
            fox.y += fox.vy * dt;
            
            fox.x = Math.max(FOX_SIZE/2, Math.min(canvas.width - FOX_SIZE/2, fox.x));
            fox.y = Math.max(150, Math.min(canvas.height - FOX_SIZE/2, fox.y));
            
            if (!rocket.exploding && fox.onRocket) {
                rocket.x = fox.x;
                rocket.y = fox.y - 70;
            }
        }
        
        function updateRocket(dt) {}
        
        function updateDirection(dt) {
            if (Math.abs(targetAngle - directionAngle) > 0.01) {
                directionAngle += (targetAngle - directionAngle) * 5 * dt;
            }
            if (Math.abs(targetRotation - screenRotation) > 0.01) {
                screenRotation += (targetRotation - screenRotation) * 3 * dt;
            }
        }
        
        function updateEnemies(dt) {
            if (Math.random() < 0.02) spawnEnemy();
            
            enemies.forEach(e => {
                switch(e.type) {
                    case 'drone':
                        e.x += Math.sin(gameTime * 3 + e.offset) * 100 * dt;
                        e.y += 80 * dt;
                        if (Math.random() < 0.01) shootEnemyBullet(e);
                        break;
                    case 'fighter':
                        const dx = fox.x - e.x;
                        const dy = fox.y - e.y;
                        const dist = Math.sqrt(dx*dx + dy*dy);
                        e.x += (dx/dist) * 120 * dt;
                        e.y += (dy/dist) * 120 * dt;
                        if (Math.random() < 0.03) shootEnemyBullet(e);
                        break;
                    case 'mother':
                        e.y += 30 * dt;
                        if (Math.random() < 0.02) {
                            shootEnemyBullet(e);
                            if (Math.random() < 0.1) spawnPowerup(e.x, e.y);
                        }
                        break;
                }
                
                if (e.y > canvas.height + 50) {
                    e.dead = true;
                }
            });
            
            enemies = enemies.filter(e => !e.dead);
        }
        
        function updateBullets(dt) {
            bullets.forEach(b => {
                b.y -= 500 * dt;
                if (b.y < -20) b.dead = true;
            });
            
            enemyBullets.forEach(b => {
                b.x += b.vx * dt;
                b.y += b.vy * dt;
                if (b.y > canvas.height + 20 || b.y < -20 || b.x < -20 || b.x > canvas.width + 20) {
                    b.dead = true;
                }
            });
            
            bullets = bullets.filter(b => !b.dead);
            enemyBullets = enemyBullets.filter(b => !b.dead);
        }
        
        function updateParticles(dt) {
            particles.forEach(p => {
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.life -= dt;
                p.vx *= 0.98;
                p.vy *= 0.98;
                if (p.life <= 0) p.dead = true;
            });
            particles = particles.filter(p => !p.dead);
        }
        
        function updatePowerups(dt) {
            powerups.forEach(p => {
                p.y += 50 * dt;
                if (p.y > canvas.height + 30) p.dead = true;
            });
            powerups = powerups.filter(p => !p.dead);
        }
        
        function checkCollisions() {
            bullets.forEach(b => {
                enemies.forEach(e => {
                    const dx = b.x - e.x;
                    const dy = b.y - e.y;
                    if (Math.sqrt(dx*dx + dy*dy) < e.size + 10) {
                        b.dead = true;
                        e.dead = true;
                        const pts = e.type === 'drone' ? 100 : e.type === 'fighter' ? 250 : 1000;
                        score += pts * (powerupsActive.multiplier > 0 ? 2 : 1);
                        spawnDeathParticles(e.x, e.y, e.color);
                    }
                });
            });
            
            if (powerupsActive.shield <= 0) {
                enemyBullets.forEach(b => {
                    const dx = b.x - fox.x;
                    const dy = b.y - fox.y;
                    if (Math.sqrt(dx*dx + dy*dy) < FOX_SIZE/2 + 5) {
                        gameOver();
                    }
                });
                
                enemies.forEach(e => {
                    const dx = e.x - fox.x;
                    const dy = e.y - fox.y;
                    if (Math.sqrt(dx*dx + dy*dy) < FOX_SIZE/2 + e.size) {
                        gameOver();
                    }
                });
            }
            
            powerups.forEach(p => {
                const dx = p.x - fox.x;
                const dy = p.y - fox.y;
                if (Math.sqrt(dx*dx + dy*dy) < FOX_SIZE/2 + 15) {
                    p.dead = true;
                    switch(p.type) {
                        case 'rapid': powerupsActive.rapidFire = 10; break;
                        case 'shield': powerupsActive.shield = 5; break;
                        case 'multi': powerupsActive.multiplier = 15; break;
                    }
                    score += 50;
                }
            });
        }
        
        function explodeRocket() {
            rocket.exploding = true;
            spawnDeathParticles(rocket.x, rocket.y, '#ff6b35');
            spawnDeathParticles(rocket.x, rocket.y, '#ffaa00');
            
            newRocket = {
                x: Math.random() * (canvas.width - 100) + 50,
                y: Math.random() * 200 + 50
            };
            newRocketTimer = 3;
            
            document.getElementById('rocketWarning').style.display = 'block';
            
            fox.onRocket = false;
        }
        
        function hopToRocket() {
            if (newRocket) {
                fox.x = newRocket.x;
                fox.y = newRocket.y - 70;
                rocket.x = newRocket.x;
                rocket.y = newRocket.y - 70;
                rocket.timer = ROCK_EXPLODE_TIME;
                rocket.exploding = false;
                fox.onRocket = true;
                
                newRocket = null;
                newRocketTimer = 0;
                document.getElementById('rocketWarning').style.display = 'none';
                
                currentBg = (currentBg + 1) % backgrounds.length;
            }
        }
        
        function updateExplosion(dt) {
            if (rocket.exploding) {
                rocket.timer -= dt;
                if (rocket.timer < -2) {
                    rocket.exploding = false;
                    rocket.timer = ROCK_EXPLODE_TIME;
                    if (!newRocket) {
                        gameOver();
                    }
                }
            }
        }
        
        function changeDirection(dir) {
            direction = (direction + dir + 8) % 8;
            targetAngle = direction * 45;
            targetRotation = direction * 45;
            
            if (direction % 2 === 0) {
                score += 200;
            }
        }
        
        function shoot() {
            bullets.push({
                x: fox.x,
                y: fox.y - 20,
                vx: 0,
                vy: -500
            });
        }
        
        function shootEnemyBullet(e) {
            const angle = Math.atan2(fox.y - e.y, fox.x - e.x);
            enemyBullets.push({
                x: e.x,
                y: e.y,
                vx: Math.cos(angle) * 250,
                vy: Math.sin(angle) * 250
            });
        }
        
        function spawnEnemy() {
            const types = ['drone', 'drone', 'drone', 'fighter', 'fighter', 'mother'];
            const type = types[Math.floor(Math.random() * types.length)];
            
            enemies.push({
                type: type,
                x: Math.random() * (canvas.width - 100) + 50,
                y: -30,
                size: type === 'drone' ? 15 : type === 'fighter' ? 20 : 35,
                offset: Math.random() * Math.PI * 2,
                color: type === 'drone' ? '#ff4444' : type === 'fighter' ? '#ff8844' : '#ff2200',
                dead: false
            });
        }
        
        function spawnPowerup(x, y) {
            const types = ['rapid', 'shield', 'multi'];
            powerups.push({
                type: types[Math.floor(Math.random() * types.length)],
                x: x,
                y: y,
                dead: false
            });
        }
        
        function spawnDeathParticles(x, y, color) {
            for (let i = 0; i < 20; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * 200 + 50;
                particles.push({
                    x: x,
                    y: y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    color: color,
                    size: Math.random() * 5 + 2,
                    life: 1,
                    dead: false
                });
            }
        }
        
        function gameOver() {
            gameState = 'GAME_OVER';
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverScreen').style.display = 'flex';
        }
        
        function render() {
            ctx.save();
            ctx.translate(canvas.width/2, canvas.height/2);
            ctx.rotate(screenRotation * Math.PI / 180);
            ctx.translate(-canvas.width/2, -canvas.height/2);
            
            renderBackground();
            renderStars();
            renderNewRocket();
            renderRocket();
            renderFox();
            renderPowerups();
            renderEnemies();
            renderBullets();
            renderParticles();
            
            ctx.restore();
            
            updateUI();
        }
        
        function renderBackground() {
            const bg = backgroundsData[backgrounds[currentBg]];
            
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, bg.color1);
            gradient.addColorStop(1, bg.color2);
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            if (bg.buildings) {
                ctx.fillStyle = '#0a0a15';
                for (let i = 0; i < 8; i++) {
                    const x = i * 110 + 20;
                    const h = 100 + Math.sin(i * 2) * 80;
                    ctx.fillRect(x, canvas.height - h - 50, 80, h + 50);
                    
                    ctx.fillStyle = Math.random() > 0.5 ? '#ff00ff' : '#00ffff';
                    for (let j = 0; j < 5; j++) {
                        if (Math.random() > 0.5) {
                            ctx.fillRect(x + 15, canvas.height - h - 40 + j * 20, 10, 10);
                        }
                    }
                    ctx.fillStyle = '#0a0a15';
                }
            }
            
            if (bg.trees) {
                ctx.fillStyle = '#0d3d0d';
                for (let i = 0; i < 15; i++) {
                    const x = i * 60 + Math.sin(i) * 30;
                    ctx.beginPath();
                    ctx.moveTo(x, canvas.height - 50);
                    ctx.lineTo(x + 20, canvas.height - 150 - Math.sin(i*2) * 50);
                    ctx.lineTo(x + 40, canvas.height - 50);
                    ctx.fill();
                }
            }
        }
        
        function renderStars() {
            const speedMult = 1 + directionAngle / 45;
            stars.forEach(s => {
                s.y += s.speed * speedMult;
                if (s.y > canvas.height) {
                    s.y = 0;
                    s.x = Math.random() * canvas.width;
                }
                
                ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function renderRocket() {
            if (rocket.exploding) {
                const size = (2 - rocket.timer) * 50;
                const gradient = ctx.createRadialGradient(rocket.x, rocket.y, 0, rocket.x, rocket.y, size);
                gradient.addColorStop(0, '#ffffff');
                gradient.addColorStop(0.3, '#ffaa00');
                gradient.addColorStop(0.6, '#ff4400');
                gradient.addColorStop(1, 'rgba(255,0,0,0)');
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.arc(rocket.x, rocket.y, size, 0, Math.PI * 2);
                ctx.fill();
                return;
            }
            
            if (!fox.onRocket && !rocket.exploding) return;
            
            ctx.save();
            ctx.translate(rocket.x, rocket.y);
            
            const rocketGradient = ctx.createLinearGradient(-15, 0, 15, 0);
            rocketGradient.addColorStop(0, '#cc4422');
            rocketGradient.addColorStop(0.5, '#ff6644');
            rocketGradient.addColorStop(1, '#cc4422');
            ctx.fillStyle = rocketGradient;
            ctx.beginPath();
            ctx.ellipse(0, 0, ROCKET_WIDTH/2, ROCKET_HEIGHT/2, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(0, -ROCKET_HEIGHT/4, ROCKET_WIDTH/3, ROCKET_HEIGHT/4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#222';
            ctx.fillRect(-20, ROCKET_HEIGHT/4, 8, 15);
            ctx.fillRect(-4, ROCKET_HEIGHT/4, 8, 15);
            ctx.fillRect(12, ROCKET_HEIGHT/4, 8, 15);
            
            if (!rocket.exploding) {
                const flameSize = 10 + Math.sin(gameTime * 30) * 5;
                const flameGradient = ctx.createLinearGradient(0, ROCKET_HEIGHT/2, 0, ROCKET_HEIGHT/2 + flameSize);
                flameGradient.addColorStop(0, '#ffffff');
                flameGradient.addColorStop(0.3, '#ffff00');
                flameGradient.addColorStop(0.6, '#ff6600');
                flameGradient.addColorStop(1, 'rgba(255,0,0,0)');
                ctx.fillStyle = flameGradient;
                ctx.beginPath();
                ctx.moveTo(-8, ROCKET_HEIGHT/2);
                ctx.lineTo(0, ROCKET_HEIGHT/2 + flameSize);
                ctx.lineTo(8, ROCKET_HEIGHT/2);
                ctx.fill();
            }
            
            ctx.restore();
        }
        
        function renderNewRocket() {
            if (newRocket) {
                ctx.globalAlpha = 0.5 + Math.sin(gameTime * 5) * 0.3;
                ctx.fillStyle = '#44ff44';
                ctx.beginPath();
                ctx.arc(newRocket.x, newRocket.y, 20, 0, Math.PI * 2);
                ctx.fill();
                ctx.globalAlpha = 1;
                
                ctx.fillStyle = '#ffffff';
                ctx.font = '10px "Press Start 2P"';
                ctx.textAlign = 'center';
                ctx.fillText('🚀', newRocket.x, newRocket.y + 40);
            }
        }
        
        function renderFox() {
            if (!fox.onRocket && !rocket.exploding && !newRocket) return;
            
            ctx.save();
            ctx.translate(fox.x, fox.y);
            
            if (powerupsActive.shield > 0) {
                ctx.strokeStyle = `rgba(0,255,255,${0.3 + Math.sin(gameTime * 10) * 0.2})`;
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(0, 0, FOX_SIZE/2 + 10, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            if (!fox.onRocket) {
                ctx.translate(0, 0);
            }
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.ellipse(0, 5, 18, 15, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.ellipse(0, 10, 12, 8, 0, 0, Math.PI);
            ctx.fill();
            
            ctx.beginPath();
            ctx.moveTo(-10, -15);
            ctx.lineTo(-3, 0);
            ctx.lineTo(-15, 5);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(10, -15);
            ctx.lineTo(3, 0);
            ctx.lineTo(15, 5);
            ctx.fill();
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.ellipse(0, -15, 12, 10, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.moveTo(-5, -22);
            ctx.lineTo(-8, -28);
            ctx.lineTo(-2, -24);
            ctx.fill();
            ctx.beginPath();
            ctx.moveTo(5, -22);
            ctx.lineTo(8, -28);
            ctx.lineTo(2, -24);
            ctx.fill();
            
            ctx.fillStyle = '#222';
            ctx.beginPath();
            ctx.ellipse(-4, -16, 3, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(4, -16, 3, 4, 0, 0, Math.PI * 2);
            ctx.fill();
            
            ctx.fillStyle = '#ff6600';
            ctx.beginPath();
            ctx.ellipse(0, 12, 6, 8, 0, 0, Math.PI);
            ctx.fill();
            
            ctx.fillStyle = '#4444ff';
            ctx.beginPath();
            ctx.moveTo(-2, 12);
            ctx.lineTo(2, 12);
            ctx.lineTo(0, 17);
            ctx.fill();
            
            ctx.fillStyle = '#44aa44';
            ctx.fillRect(-10, -5, 20, 15);
            ctx.fillStyle = '#338833';
            ctx.fillRect(-8, -3, 6, 10);
            ctx.fillRect(2, -3, 6, 10);
            
            ctx.fillStyle = '#884422';
            const bpW = 8;
            const bpH = 12;
            ctx.fillRect(-bpW - 4, -bpH/2, bpW, bpH);
            ctx.strokeStyle = '#553311';
            ctx.lineWidth = 1;
            ctx.strokeRect(-bpW - 4, -bpH/2, bpW, bpH);
            
            ctx.restore();
        }
        
        function renderEnemies() {
            enemies.forEach(e => {
                ctx.save();
                ctx.translate(e.x, e.y);
                
                ctx.fillStyle = e.color;
                
                if (e.type === 'drone') {
                    ctx.beginPath();
                    ctx.moveTo(0, -e.size);
                    ctx.lineTo(e.size, e.size);
                    ctx.lineTo(-e.size, e.size);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.beginPath();
                    ctx.arc(0, e.size/2, 4, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.type === 'fighter') {
                    ctx.beginPath();
                    ctx.moveTo(0, -e.size);
                    ctx.lineTo(e.size, e.size);
                    ctx.lineTo(e.size/2, e.size/2);
                    ctx.lineTo(0, e.size);
                    ctx.lineTo(-e.size/2, e.size/2);
                    ctx.lineTo(-e.size, e.size);
                    ctx.fill();
                    ctx.fillStyle = '#ffff00';
                    ctx.beginPath();
                    ctx.arc(0, 0, 3, 0, Math.PI * 2);
                    ctx.fill();
                } else if (e.type === 'mother') {
                    ctx.fillStyle = '#440000';
                    ctx.beginPath();
                    ctx.arc(0, 0, e.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = e.color;
                    ctx.beginPath();
                    ctx.arc(0, 0, e.size - 8, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    for (let i = 0; i < 4; i++) {
                        const angle = i * Math.PI / 2;
                        ctx.beginPath();
                        ctx.arc(Math.cos(angle) * 12, Math.sin(angle) * 12, 5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
                
                ctx.restore();
            });
        }
        
        function renderBullets() {
            bullets.forEach(b => {
                ctx.fillStyle = '#00ff00';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillStyle = '#88ff88';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            
            enemyBullets.forEach(b => {
                ctx.fillStyle = '#ff4444';
                ctx.beginPath();
                ctx.arc(b.x, b.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
        }
        
        function renderParticles() {
            particles.forEach(p => {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function renderPowerups() {
            powerups.forEach(p => {
                ctx.save();
                ctx.translate(p.x, p.y);
                
                const glow = 0.5 + Math.sin(gameTime * 5) * 0.3;
                
                switch(p.type) {
                    case 'rapid':
                        ctx.fillStyle = `rgba(255,0,0,${glow})`;
                        ctx.fillRect(-10, -10, 20, 20);
                        ctx.fillStyle = '#fff';
                        ctx.font = '12px "Press Start 2P"';
                        ctx.textAlign = 'center';
                        ctx.fillText('⚡', 0, 4);
                        break;
                    case 'shield':
                        ctx.fillStyle = `rgba(0,255,255,${glow})`;
                        ctx.beginPath();
                        ctx.arc(0, 0, 12, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.strokeStyle = '#fff';
                        ctx.lineWidth = 2;
                        ctx.beginPath();
                        ctx.arc(0, 0, 8, 0, Math.PI * 2);
                        ctx.stroke();
                        break;
                    case 'multi':
                        ctx.fillStyle = `rgba(255,255,0,${glow})`;
                        ctx.beginPath();
                        ctx.arc(0, 0, 12, 0, Math.PI * 2);
                        ctx.fill();
                        ctx.fillStyle = '#000';
                        ctx.font = '10px "Press Start 2P"';
                        ctx.textAlign = 'center';
                        ctx.fillText('×2', 0, 4);
                        break;
                }
                
                ctx.restore();
            });
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('timer').textContent = Math.max(0, Math.ceil(rocket.timer));
            document.getElementById('direction').textContent = directionNames[direction];
        }
        
        document.addEventListener('keydown', e => {
            keys[e.code] = true;
            if (['Space', 'ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.code)) {
                e.preventDefault();
            }
        });
        
        document.addEventListener('keyup', e => {
            keys[e.code] = false;
        });
        
        init();
    </script>
</body>
</html>
